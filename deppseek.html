<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek מול Claude Sonnet 4.6 - השוואת יכולות</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/babel-standalone@6.26.0/babel.min.js"></script>
    <style>
        /* ... כל הסגנונות הקודמים נשארים ... */
        /* ========== TOP HEADER NEW STYLES ========== */
        .top-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(17, 24, 39, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 20px;
            /* אנימציית כניסה */
            animation: slideDown 0.6s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* כל חוצץ (קבוצת פריטים) */
        .header-group {
            display: flex;
            align-items: center;
            gap: 8px;
            /* קו מפריד עדין בין הקבוצות (בצדדים) */
            position: relative;
        }
        /* קווי הפרדה רק בין קבוצות שונות, לא בתוך אותה קבוצה */
        .header-group:not(:last-child)::after {
            content: '';
            width: 1px;
            height: 28px;
            background: linear-gradient(to bottom, transparent, rgba(148, 163, 184, 0.3), transparent);
            margin-left: 4px;
        }
        /* צד ימין (תפריט) - בRTL ימין = התחלה */
        .header-right {
            /* מחזיק קישורי ניווט */
        }
        .header-center {
            flex: 0 1 auto;
            /* לוגו במרכז ממש */
            display: flex;
            justify-content: center;
        }
        .header-left {
            /* כפתורי התחברות */
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .nav-link {
            background: transparent;
            border: none;
            color: #cbd5e1;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            text-decoration: none;
            white-space: nowrap;
        }
        .nav-link:hover {
            background: rgba(26, 115, 232, 0.12);
            color: #fff;
            transform: translateY(-1px);
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 50%;
            width: 0;
            height: 2px;
            background: #00d4aa;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }
        .nav-link:hover::after {
            width: 60%;
        }

        /* לוגו */
        .logo-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .logo-wrapper:hover {
            transform: scale(1.03);
        }
        .logo-icon {
            font-size: 2.2rem;
            filter: drop-shadow(0 0 10px rgba(0, 212, 170, 0.6));
            transition: filter 0.3s;
        }
        .logo-wrapper:hover .logo-icon {
            filter: drop-shadow(0 0 20px rgba(0, 212, 170, 0.9));
        }
        .logo-text {
            font-weight: 800;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #60a5fa, #00d4aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* כפתורי התחברות / הרשמה */
        .auth-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .btn-login, .btn-signup {
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .btn-login {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #e2e8f0;
        }
        .btn-login:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transform: translateY(-2px);
        }
        .btn-signup {
            background: linear-gradient(135deg, #1a73e8, #2563eb);
            color: white;
            border: 1px solid transparent;
            box-shadow: 0 4px 14px rgba(26, 115, 232, 0.4);
        }
        .btn-signup:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            box-shadow: 0 6px 22px rgba(26, 115, 232, 0.7);
            transform: translateY(-2px);
        }
        /* אפקט גלישה פנימי */
        .btn-signup::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .btn-signup:hover::after {
            opacity: 1;
        }

        /* רספונסיביות */
        @media (max-width: 768px) {
            .top-header {
                flex-wrap: wrap;
                padding: 12px 16px;
            }
            .header-group::after {
                display: none;
            }
            .header-center {
                order: -1;
                flex-basis: 100%;
                margin-bottom: 8px;
            }
            .nav-links {
                gap: 0;
            }
            .nav-link {
                padding: 6px 8px;
                font-size: 0.8rem;
            }
            .auth-buttons .btn-login,
            .auth-buttons .btn-signup {
                padding: 8px 14px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // ==================== TOP HEADER COMPONENT ====================
        function TopHeader() {
            return (
                <header className="top-header">
                    {/* צד ימין (התחלה ב-RTL) - קישורים */}
                    <div className="header-group header-right">
                        <nav className="nav-links">
                            <a href="#" className="nav-link">🏠 בית</a>
                            <a href="#" className="nav-link">📊 השוואה</a>
                            <a href="#" className="nav-link">💡 יכולות</a>
                            <a href="#" className="nav-link">📞 צור קשר</a>
                        </nav>
                    </div>

                    {/* מרכז - לוגו */}
                    <div className="header-group header-center">
                        <div className="logo-wrapper">
                            <span className="logo-icon">🐋</span>
                            <span className="logo-text">DeepSeek</span>
                        </div>
                    </div>

                    {/* צד שמאל (סוף ב-RTL) - התחברות */}
                    <div className="header-group header-left">
                        <div className="auth-buttons">
                            <button className="btn-login">התחברות</button>
                            <button className="btn-signup">הרשמה ✨</button>
                        </div>
                    </div>
                </header>
            );
        }
        function Header() {
    return (
        <header className="header">
            <h1>🐋 DeepSeek מול Claude Sonnet 4.6</h1>
            <p className="subtitle">השוואת יכולות מקיפה • שקופה • מבוססת עובדות</p>
            <span className="badge">🟢 גרסה נוכחית: DeepSeek (2025) | חינם תמיד</span>
        </header>
    );
}
function VSBanner() {
    return (
        <div className="vs-banner">
            <div className="vs-competitor deepseek">
                <span className="vs-icon">🐋</span>
                <span className="vs-name">DeepSeek</span>
                <span className="vs-version">מודל מתקדם • 2025</span>
            </div>
            <span className="vs-divider">⚡ VS ⚡</span>
            <div className="vs-competitor claude">
                <span className="vs-icon">🧠</span>
                <span className="vs-name">Claude</span>
                <span className="vs-version">Sonnet 4.6 • Anthropic</span>
            </div>
        </div>
    );
}
        function App() {
            const [activeTab, setActiveTab] = useState('overview');
            // ... (זהה לחלוטין לקוד הקודם)
            return (
                <div>
                    <TopHeader />
                    <div className="app-container">
                        <Header />
                        <VSBanner />
                        {/* ... rest of the app */}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
